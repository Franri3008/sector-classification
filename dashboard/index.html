<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sector Classification — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* ─── viz-styles.css (verbatim) ──────────────────────────────────────── */
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
      background-color: white;
    }
    .viz-grid {
      display: grid;
      grid-template-rows: 16fr 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      height: 100vh; width: 100vw;
      box-sizing: border-box;
      padding-bottom: clamp(8px, 2vh, 18px);
    }
    #viz { width: 100%; height: 100%; min-height: 0; min-width: 0; }
    #chart { display: block; width: 100%; height: 100%; }
    .legend {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: clamp(6px, 1vw, 14px);
      background: rgba(255, 255, 255, 1);
      padding: clamp(4px, 1vh, 10px) clamp(10px, 2vw, 16px);
      border-radius: clamp(6px, 1vw, 12px);
      max-width: 100%; max-height: 100%;
      font-size: clamp(0.625rem, 1.4vw, 1rem);
    }
    .legend-item {
      display: flex; align-items: center; gap: clamp(4px, 1vw, 8px);
      font-weight: 600; color: #333; font-size: inherit; padding: 2px 6px; cursor: default;
    }
    .legend-square {
      width: clamp(8px, 0.9vw, 12px); height: clamp(8px, 0.9vw, 12px);
      border-radius: 0; flex-shrink: 0;
    }
    .source-text {
      font-size: clamp(10px, 1.6vw, 16px); font-weight: 600; color: #333;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%; font-style: normal;
    }
    .source-text a { color: #2756d3; text-decoration: underline; cursor: default; font-style: normal; }
    .logo { height: 100%; width: auto; max-height: 100%; max-width: 100%; pointer-events: auto; object-fit: contain; }
    .axis path, .axis line { stroke: #cfd2d7; }
    .tick text { font-weight: 600; fill: #4b5563; }
    .grid-lines line { stroke: #DBDBDB; stroke-dasharray: 2, 3; }
    .grid-lines path { stroke: none; }
    .bar-label { fill: #555; font-weight: 500; }

    /* ─── Dashboard-specific grid ────────────────────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      grid-template-columns: 1fr 1fr;
      height: 100vh; width: 100vw;
      box-sizing: border-box;
      padding: 16px 20px 12px;
      gap: 10px;
      background: #fff;
    }
    .dash-header {
      grid-row: 1; grid-column: 1 / span 2;
      display: flex; flex-direction: column; gap: 6px;
      min-width: 0;
    }
    .dash-title-row {
      display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
      flex-wrap: wrap; min-width: 0;
    }
    .dash-title {
      font-size: clamp(16px, 2.2vw, 22px);
      font-weight: 700; color: #111;
      margin: 0; letter-spacing: -0.01em;
    }
    .dash-meta {
      font-size: clamp(10px, 1.2vw, 13px); font-weight: 500; color: #64748b;
    }
    .dash-meta code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #334155; background: #f1f5f9; padding: 1px 5px; border-radius: 3px;
    }
    .dash-kpis {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: stretch; min-width: 0;
    }
    .dash-kpi {
      flex: 1 1 140px; min-width: 0;
      border: 1px solid rgba(17, 24, 39, 0.1);
      border-radius: 6px; padding: 8px 12px;
      background: #fff;
      display: flex; flex-direction: column; gap: 3px;
    }
    .dash-kpi-label {
      font-size: clamp(9px, 1.1vw, 12px);
      font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 6px;
    }
    .dash-kpi-swatch {
      width: 8px; height: 8px; border-radius: 0; flex-shrink: 0;
    }
    .dash-kpi-stats {
      display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap;
    }
    .dash-kpi-stat {
      display: flex; flex-direction: column;
    }
    .dash-kpi-value {
      font-size: clamp(14px, 1.8vw, 20px);
      font-weight: 700; color: #111; line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }
    .dash-kpi-unit {
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 500; color: #64748b;
    }
    .dash-panel {
      display: flex; flex-direction: column;
      min-width: 0; min-height: 0;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 6px;
      padding: 8px 10px 4px;
      background: #fff;
    }
    #panel-top { grid-row: 2; grid-column: 1; }
    #panel-sections { grid-row: 2; grid-column: 2; }
    .dash-panel-title {
      font-size: clamp(11px, 1.3vw, 14px); font-weight: 700; color: #111;
      padding-bottom: 4px; flex-shrink: 0;
    }
    .dash-panel-chart {
      flex: 1 1 auto; min-height: 0;
      position: relative;
    }
    #dash-legend-row {
      grid-row: 3; grid-column: 1 / span 2;
      display: flex; align-items: center; justify-content: center;
    }
    #dash-source {
      grid-row: 4; grid-column: 1;
      display: flex; align-items: center;
    }
    #dash-logo {
      grid-row: 4; grid-column: 2;
      display: flex; align-items: center; justify-content: flex-end;
      height: clamp(18px, 3vh, 28px);
    }
    #dash-logo a { height: 100%; display: flex; align-items: center; cursor: default; }
    .empty-note {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #94a3b8;
      font-size: clamp(11px, 1.2vw, 13px); font-style: italic;
    }

    /* Tooltip */
    #tooltip {
      position: fixed; pointer-events: none;
      background: #1e293b; color: #fff;
      padding: 6px 9px; border-radius: 4px;
      font-size: 12px; line-height: 1.35;
      opacity: 0; transition: opacity 0.12s ease;
      z-index: 20;
      max-width: 280px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #tooltip .tt-title { font-weight: 700; margin-bottom: 3px; }
    #tooltip .tt-row { display: flex; gap: 8px; justify-content: space-between; }
    #tooltip .tt-swatch {
      display: inline-block; width: 8px; height: 8px; margin-right: 5px;
    }
    #tooltip .tt-num { font-variant-numeric: tabular-nums; font-weight: 600; }
  </style>
</head>
<body>
  <div class="dash-grid">
    <header class="dash-header">
      <div class="dash-title-row">
        <h1 class="dash-title">Sector Classification — Dashboard</h1>
        <div class="dash-meta" id="meta">loading…</div>
      </div>
      <div class="dash-kpis" id="kpis"></div>
    </header>

    <section class="dash-panel" id="panel-top">
      <div class="dash-panel-title">Top divisions by mappings (stacked by source)</div>
      <div class="dash-panel-chart" id="viz-top"></div>
    </section>

    <section class="dash-panel" id="panel-sections">
      <div class="dash-panel-title">NACE sections (21 sections, stacked by source)</div>
      <div class="dash-panel-chart" id="viz-sections"></div>
    </section>

    <div id="dash-legend-row">
      <div class="legend" id="legend"></div>
    </div>

    <div id="dash-source">
      <div class="source-text">Source: generated by <code>python main.py build-dashboard</code></div>
    </div>

    <div id="dash-logo">
      <a href="https://aiworld.eu/" target="_blank" rel="noopener">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
      </a>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    // ─── Config ─────────────────────────────────────────────────────────────
    const TOP_N_DIVISIONS = 20;
    const DATA_URL = "data.json";
    const tooltip = document.getElementById("tooltip");

    // ─── Data helpers ───────────────────────────────────────────────────────
    function smartFormat(v) {
      if (!isFinite(v)) return "N/A";
      if (Math.abs(v) >= 1e6) return d3.format(".1f")(v / 1e6) + "M";
      if (Math.abs(v) >= 1e3) return d3.format(",")(v);
      return d3.format(",")(v);
    }
    function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }

    function showTooltip(html, evt) {
      tooltip.innerHTML = html;
      tooltip.style.left = (evt.clientX + 14) + "px";
      tooltip.style.top  = (evt.clientY - 24) + "px";
      tooltip.style.opacity = "1";
    }
    function hideTooltip() { tooltip.style.opacity = "0"; }

    // ─── Renderers ──────────────────────────────────────────────────────────
    let DATA = null;
    let sourceNames = [];
    let colorBySource = {};

    function renderMeta() {
      const meta = document.getElementById("meta");
      const when = DATA.generated_at ? new Date(DATA.generated_at).toLocaleString() : "unknown";
      meta.innerHTML = `generated <code>${when}</code> · ${DATA.n_divisions} divisions · ${DATA.n_sections} sections`;
    }

    function renderKPIs() {
      const box = document.getElementById("kpis");
      box.innerHTML = "";
      if (!DATA.sources.length) {
        box.innerHTML = `<div class="empty-note" style="padding:10px 0;">No classified sources yet — run <code>python main.py run-all</code> then <code>python main.py build-dashboard</code>.</div>`;
        return;
      }
      DATA.sources.forEach(s => {
        const card = document.createElement("div");
        card.className = "dash-kpi";
        card.innerHTML = `
          <div class="dash-kpi-label">
            <span class="dash-kpi-swatch" style="background:${s.color}"></span>
            <span>${s.source}</span>
          </div>
          <div class="dash-kpi-stats">
            <div class="dash-kpi-stat"><span class="dash-kpi-value">${smartFormat(s.total_mappings)}</span><span class="dash-kpi-unit">mappings</span></div>
            <div class="dash-kpi-stat"><span class="dash-kpi-value">${smartFormat(s.unique_keys)}</span><span class="dash-kpi-unit">keys</span></div>
            <div class="dash-kpi-stat"><span class="dash-kpi-value">${s.sectors_covered}</span><span class="dash-kpi-unit">of ${DATA.n_divisions} sectors</span></div>
          </div>
        `;
        box.appendChild(card);
      });
    }

    function renderLegend() {
      const box = document.getElementById("legend");
      box.innerHTML = "";
      DATA.sources.forEach(s => {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `<span class="legend-square" style="background:${s.color}"></span><span>${s.source}</span>`;
        box.appendChild(item);
      });
      if (!DATA.sources.length) {
        box.innerHTML = `<div class="legend-item" style="color:#94a3b8;font-style:italic">no sources</div>`;
      }
    }

    function stackedBarChart({ container, rows, keyField, labelField, title }) {
      container.innerHTML = "";
      const rect = container.getBoundingClientRect();
      const width  = Math.max(320, rect.width);
      const height = Math.max(200, rect.height);

      if (!rows.length || !sourceNames.length) {
        const el = document.createElement("div");
        el.className = "empty-note";
        el.textContent = "No data available";
        container.appendChild(el);
        return;
      }

      const maxLabelLen = Math.min(48, d3.max(rows, r => String(r[labelField]).length));
      const axisFont = Math.max(9, Math.min(12, height / rows.length * 0.48));
      const yLabelWidth = Math.min(width * 0.42, maxLabelLen * (axisFont * 0.55) + 14);

      const maxTotal = d3.max(rows, r => r.__total) || 1;
      const totalStr = d3.format(",")(maxTotal);
      const rightMargin = Math.max(44, totalStr.length * 7 + 18);

      const margin = { top: 6, right: rightMargin, bottom: 22, left: yLabelWidth + 10 };
      const innerWidth  = Math.max(40, width  - margin.left - margin.right);
      const innerHeight = Math.max(40, height - margin.top  - margin.bottom);

      const svg = d3.select(container).append("svg")
        .attr("width", width).attr("height", height)
        .attr("viewBox", `0 0 ${width} ${height}`)
        .style("width", "100%").style("height", "100%");

      const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      const y = d3.scaleBand()
        .domain(rows.map(r => r[keyField]))
        .range([0, innerHeight])
        .paddingInner(0.22);

      const x = d3.scaleLinear().domain([0, maxTotal * 1.05]).nice().range([0, innerWidth]);

      g.append("g").attr("class", "grid-lines")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(x).ticks(Math.max(3, Math.floor(innerWidth / 80))).tickSize(-innerHeight).tickFormat(""))
        .select(".domain").remove();

      const stackData = d3.stack().keys(sourceNames)(rows);

      const layers = g.selectAll(".layer").data(stackData).enter()
        .append("g")
        .attr("fill", (_, i) => colorBySource[sourceNames[i]]);

      layers.selectAll("rect").data(d => d.map(seg => ({ seg, source: d.key }))).enter()
        .append("rect")
          .attr("y", d => y(d.seg.data[keyField]))
          .attr("height", y.bandwidth())
          .attr("x", d => x(d.seg[0]))
          .attr("width", 0)
          .on("mousemove", (evt, d) => {
            const row = d.seg.data;
            const rowsHtml = sourceNames
              .map(sn => `<div class="tt-row"><span><span class="tt-swatch" style="background:${colorBySource[sn]}"></span>${sn}</span><span class="tt-num">${d3.format(",")(row[sn] || 0)}</span></div>`)
              .join("");
            showTooltip(
              `<div class="tt-title">${row[labelField]}</div>${rowsHtml}<div class="tt-row" style="margin-top:3px;border-top:1px solid #475569;padding-top:3px"><span>total</span><span class="tt-num">${d3.format(",")(row.__total)}</span></div>`,
              evt
            );
          })
          .on("mouseleave", hideTooltip)
        .transition().duration(700).ease(d3.easeCubicOut).delay((_, i) => i * 6)
          .attr("width", d => Math.max(0, x(d.seg[1]) - x(d.seg[0])));

      g.append("g").attr("class", "axis")
        .call(d3.axisLeft(y).tickFormat(d => truncate(String(d), Math.floor(yLabelWidth / (axisFont * 0.55)))))
        .selectAll("text")
          .style("font-size", `${axisFont}px`)
          .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

      g.append("g").attr("class", "axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(x).ticks(Math.max(3, Math.floor(innerWidth / 80))).tickFormat(d3.format(",")))
        .selectAll("text")
          .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif");

      g.selectAll(".total-label").data(rows).enter()
        .append("text")
          .attr("class", "bar-label")
          .attr("x", r => x(r.__total) + 5)
          .attr("y", r => y(r[keyField]) + y.bandwidth() / 2)
          .attr("dy", "0.35em")
          .style("font-family", "system-ui, -apple-system, Segoe UI, Roboto, sans-serif")
          .style("font-size", `${axisFont}px`)
          .attr("opacity", 0)
          .text(r => d3.format(",")(r.__total))
        .transition().duration(700).delay(200).attr("opacity", 1);
    }

    function renderTopDivisions() {
      const container = document.getElementById("viz-top");
      const byName = {};
      DATA.sources.forEach(s => {
        Object.entries(s.by_division_name).forEach(([name, count]) => {
          if (!byName[name]) {
            byName[name] = { sector: name, __total: 0 };
            sourceNames.forEach(sn => byName[name][sn] = 0);
          }
          byName[name][s.source] = count;
          byName[name].__total += count;
        });
      });
      const rows = Object.values(byName)
        .sort((a, b) => b.__total - a.__total)
        .slice(0, TOP_N_DIVISIONS);

      stackedBarChart({
        container,
        rows,
        keyField: "sector",
        labelField: "sector",
      });
    }

    function renderSections() {
      const container = document.getElementById("viz-sections");
      const byCode = {};
      DATA.sections.forEach(sec => {
        byCode[sec.section_code] = {
          section_code: sec.section_code,
          section_name: sec.section_name,
          label: `${sec.section_code}: ${sec.section_name}`,
          __total: 0,
        };
        sourceNames.forEach(sn => byCode[sec.section_code][sn] = 0);
      });
      DATA.sources.forEach(s => {
        Object.entries(s.by_section_code).forEach(([code, count]) => {
          if (!byCode[code]) return;
          byCode[code][s.source] = count;
          byCode[code].__total += count;
        });
      });
      const rows = Object.values(byCode)
        .filter(r => r.__total > 0)
        .sort((a, b) => b.__total - a.__total);

      stackedBarChart({
        container,
        rows,
        keyField: "label",
        labelField: "label",
      });
    }

    function renderAll() {
      renderMeta();
      renderKPIs();
      renderLegend();
      renderTopDivisions();
      renderSections();
    }

    // Debounced resize
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderAll, 180);
    });

    // Load data
    fetch(DATA_URL, { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(d => {
        DATA = d;
        sourceNames = DATA.sources.map(s => s.source);
        colorBySource = Object.fromEntries(DATA.sources.map(s => [s.source, s.color]));
        renderAll();
      })
      .catch(err => {
        document.getElementById("meta").innerHTML =
          `<span style="color:#dc2626">Failed to load ${DATA_URL}: ${err.message}. Run <code>python main.py build-dashboard</code> first.</span>`;
      });
  </script>
</body>
</html>
